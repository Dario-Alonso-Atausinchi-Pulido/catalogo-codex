<section class="catalog-page page-shell">
  <header class="catalog-head">
    <div>
      <p class="eyebrow">Biblioteca arcade</p>
      <h1>Elige un juego</h1>
    </div>

    <span class="catalog-head__count">
      {{ games.length }} {{ games.length === 1 ? 'juego listo' : 'juegos listos' }}
    </span>
  </header>

  @if (games.length) {
    <section class="catalog-grid" aria-label="Biblioteca de juegos">
      @for (game of games; track game.slug) {
        <app-game-card [game]="game" />
      }
    </section>
  } @else {
    <app-empty-state-card
      eyebrow="Biblioteca vacia"
      title="Todavia no hay juegos"
      description="Registra un juego nuevo y agrega una portada placeholder para que aparezca en la biblioteca."
      [notes]="onboardingSteps"
    />
  }
</section>
