<article class="game-card panel-surface" [class.game-card--interactive]="isAvailable()">
  @if (isAvailable()) {
    <a
      class="game-card__hitbox"
      [routerLink]="game().routePath"
      [attr.aria-label]="'Entrar a ' + game().title"
    ></a>
  }

  <div class="game-card__visual">
    @if (hasCover()) {
      <img
        [src]="resolvedCoverPath()"
        [alt]="'Portada de ' + game().title"
        (error)="onCoverError()"
      />
    } @else {
      <div class="game-card__placeholder" aria-hidden="true">
        <span>{{ game().title }}</span>
      </div>
    }

    <div class="game-card__overlay">
      <span class="game-card__state">{{ statusMeta().label }}</span>
    </div>
  </div>

  <div class="game-card__body">
    <p class="game-card__slug">{{ game().slug }}</p>
    <h3>{{ game().title }}</h3>
    @if (game().subtitle) {
      <p class="game-card__subtitle">{{ game().subtitle }}</p>
    }
    <p class="game-card__summary">{{ game().summary }}</p>

    @if (game().tags.length) {
      <span class="game-card__tag">{{ game().tags[0] }}</span>
    }
  </div>
</article>
