<section class="empty-state panel-surface">
  <div class="empty-state__display">
    <div class="empty-state__leds" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <p class="eyebrow">{{ eyebrow() }}</p>
    <h3>{{ title() }}</h3>
    <p class="empty-state__description">{{ description() }}</p>
  </div>

  @if (notes().length) {
    <div class="empty-state__instructions">
      <p class="empty-state__caption">Secuencia de arranque</p>

      <ul class="empty-state__notes">
        @for (note of notes(); track note) {
          <li>{{ note }}</li>
        }
      </ul>
    </div>
  }
</section>
